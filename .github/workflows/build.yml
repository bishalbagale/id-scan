name: Build Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Flask Flask-Cors Pillow zxing-cpp pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile server.py

    - name: Upload EXE to Release
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $tag = if ("${{ github.ref_type }}" -eq "tag") {
          "${{ github.ref_name }}"
        } else {
          "manual-${{ github.run_number }}"
        }

        gh release view $tag 2>$null
        if ($LASTEXITCODE -ne 0) {
          gh release create $tag --title $tag --notes "Windows executable build."
        }

        gh release upload $tag dist/server.exe --clobber
